name: Daily Autobot Posts

on:
  schedule:
    # Run every 3 hours throughout the day (8 times per 24 hours)
    # Each run posts 1-3 pieces dynamically. Bot learns which hours get best engagement.
    - cron: '0 0 * * *'   # 00:00 UTC (Midnight)
    - cron: '0 3 * * *'   # 03:00 UTC
    - cron: '0 6 * * *'   # 06:00 UTC
    - cron: '0 9 * * *'   # 09:00 UTC (Morning)
    - cron: '0 12 * * *'  # 12:00 UTC (Noon)
    - cron: '0 15 * * *'  # 15:00 UTC (3 PM)
    - cron: '0 18 * * *'  # 18:00 UTC (Evening)
    - cron: '0 21 * * *'  # 21:00 UTC (9 PM)
  workflow_dispatch:  # Allow manual trigger

jobs:
  autobot_research_loop:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git operations
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run autobot research loop
        run: python researcher.py
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      
      - name: Configure git
        run: |
          git config user.name "autobot"
          git config user.email "autobot@users.noreply.github.com"
      
      - name: Commit and push changes
        run: |
          # Check if there are actual changes
          if ! git diff --quiet strategy.md data/experiments.jsonl; then
            git add strategy.md data/experiments.jsonl
            git commit -m "autobot: daily experiment [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
