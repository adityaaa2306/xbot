name: Daily Autobot Posts

on:
  schedule:
    # Run every 3 hours throughout the day (8 times per 24 hours)
    # Each run posts 1-3 pieces dynamically. Bot learns which hours get best engagement.
    - cron: '0 0 * * *'   # 00:00 UTC (Midnight)
    - cron: '0 3 * * *'   # 03:00 UTC
    - cron: '0 6 * * *'   # 06:00 UTC
    - cron: '0 9 * * *'   # 09:00 UTC (Morning)
    - cron: '0 12 * * *'  # 12:00 UTC (Noon)
    - cron: '0 15 * * *'  # 15:00 UTC (3 PM)
    - cron: '0 18 * * *'  # 18:00 UTC (Evening)
    - cron: '0 21 * * *'  # 21:00 UTC (9 PM)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  autobot_research_loop:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0  # Full history for git operations
          ref: ${{ github.ref }}
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run autobot research loop
        run: python main.py
        env:
          GETXAPI_API_KEY: ${{ secrets.GETXAPI_API_KEY }}
          GETXAPI_AUTH_TOKEN: ${{ secrets.GETXAPI_AUTH_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      
      - name: Configure git
        run: |
          git config user.name "autobot"
          git config user.email "autobot@users.noreply.github.com"
      
      - name: Commit and push changes
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          git add -f strategy.md data/experiments.jsonl memory/tweet_log.jsonl memory/strategy_log.jsonl memory/pattern_library.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "autobot: daily experiment [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "✅ No changes to commit"
          fi
