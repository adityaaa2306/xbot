name: Daily Autobot Posts

on:
  schedule:
    # 9 daily opportunities in IST:
    # 06:15, 08:15, 10:15, 12:15, 14:15, 16:15, 18:15, 20:15, 22:15
    - cron: '45 0 * * *'   # 06:15 IST
    - cron: '45 2 * * *'   # 08:15 IST
    - cron: '45 4 * * *'   # 10:15 IST
    - cron: '45 6 * * *'   # 12:15 IST
    - cron: '45 8 * * *'   # 14:15 IST
    - cron: '45 10 * * *'  # 16:15 IST
    - cron: '45 12 * * *'  # 18:15 IST
    - cron: '45 14 * * *'  # 20:15 IST
    - cron: '45 16 * * *'  # 22:15 IST
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  autobot_research_loop:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0  # Full history for git operations
          ref: ${{ github.ref }}
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run autobot research loop
        run: python main.py
        env:
          GETXAPI_API_KEY: ${{ secrets.GETXAPI_API_KEY }}
          GETXAPI_AUTH_TOKEN: ${{ secrets.GETXAPI_AUTH_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      
      - name: Configure git
        run: |
          git config user.name "autobot"
          git config user.email "autobot@users.noreply.github.com"
      
      - name: Commit and push changes
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          git add -f strategy.md data/experiments.jsonl data/research_brief.json memory/tweet_log.jsonl memory/strategy_log.jsonl memory/pattern_library.jsonl memory/signal_raw.jsonl memory/signal_filtered.jsonl memory/signal_analyses.jsonl memory/research_briefs.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "autobot: daily experiment [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "✅ No changes to commit"
          fi
